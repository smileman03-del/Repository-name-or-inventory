<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수술실 소모품 재고관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a202c}
.app{max-width:680px;margin:0 auto;min-height:100vh}
.header{background:#2F5597;padding:14px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
.htitle{font-size:15px;font-weight:700;color:#fff}
.hsub{font-size:11px;color:rgba(255,255,255,0.85);margin-top:2px}
.rbtn{margin-left:auto;background:rgba(255,255,255,0.2);border:none;border-radius:8px;padding:7px 14px;font-size:12px;color:#fff;cursor:pointer;font-weight:600}
.nav{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:57px;z-index:40}
.nb{flex:1;padding:12px 4px;font-size:12px;font-weight:600;color:#718096;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer}
.nb.active{color:#2F5597;border-bottom-color:#2F5597}
.page{display:none;padding:12px}
.page.active{display:block}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:14px;text-align:center}
.sn{font-size:30px;font-weight:700;line-height:1}
.sl{font-size:11px;color:#718096;margin-top:4px}
.sn.d{color:#C00000}.sn.o{color:#276749}.sn.t{color:#2F5597}
.sbox{width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;font-size:16px;color:#1a202c;margin-bottom:10px;display:block;-webkit-appearance:none}
.sbox:focus{outline:none;border-color:#2F5597}
.frow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:7px 16px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;color:#718096;cursor:pointer}
.fb.active{background:#2F5597;color:#fff;border-color:#2F5597}
.atabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.atabs::-webkit-scrollbar{display:none}
.at{padding:7px 16px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;color:#718096;cursor:pointer;white-space:nowrap;flex-shrink:0}
.at.active{background:#2F5597;color:#fff;border-color:#2F5597}
.ic{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px 14px;margin-bottom:8px}
.ic.d{border-left:4px solid #C00000}.ic.o{border-left:4px solid #276749}
.itop{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.iname{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.bdg.d{background:#FFE0E0;color:#C00000}.bdg.o{background:#E0F0E8;color:#276749}
.imeta{font-size:11px;color:#718096;margin-bottom:8px}
.ibot{display:flex;align-items:center;gap:6px}
.slbl{font-size:12px;color:#718096;flex-shrink:0}
.sinp{width:60px;height:36px;text-align:center;font-size:15px;font-weight:600;border:1.5px solid #cbd5e0;border-radius:6px;background:#fff;color:#1a202c}
.sbtn{padding:8px 14px;border-radius:6px;border:none;background:#2F5597;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.dbtn{padding:8px 14px;border-radius:6px;border:none;background:#FFE0E0;color:#C00000;font-size:12px;font-weight:700;cursor:pointer}
.asec{margin-bottom:16px}
.ahdr{font-size:13px;font-weight:700;color:#2F5597;padding:8px 12px;background:#EBF1FB;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between}
.rcard{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:12px}
.rhdr{background:#EBF1FB;padding:10px 14px;font-size:13px;font-weight:600;color:#2F5597;display:flex;justify-content:space-between;align-items:center}
.rrow{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #e2e8f0}
.rname{flex:1;min-width:0}
.rname p{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rname span{font-size:11px;color:#718096}
.qc{display:flex;align-items:center;gap:4px}
.qbtn{width:32px;height:32px;border-radius:6px;border:1px solid #cbd5e0;background:#f7fafc;color:#2F5597;font-size:18px;font-weight:700;cursor:pointer}
.qinp{width:44px;height:32px;text-align:center;font-size:14px;font-weight:600;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:#1a202c}
.ckbtn{width:36px;height:36px;border-radius:6px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.ckbtn.on{background:#2F5597;color:#fff}.ckbtn.off{background:#f0f4f8;color:#718096}
.subbtn{width:100%;padding:15px;background:#2F5597;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.subbtn:disabled{background:#cbd5e0;color:#718096;cursor:default}
.gbtn{width:100%;padding:13px;background:#fff;border:2px solid #2F5597;color:#2F5597;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.wrow{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #e2e8f0}
.wrow.done{border-left:4px solid #276749}.wrow.pending{border-left:4px solid #BA7517}
.winfo{flex:1;min-width:0}
.winfo p{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.winfo span{font-size:11px;color:#718096}
.hcard{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px 14px;margin-bottom:8px}
.hdate{font-size:11px;color:#718096;margin-bottom:8px}
.hrow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #e2e8f0}
.hrow:last-child{border-bottom:none}
.hqty{font-weight:700;color:#2F5597}
.empty{text-align:center;padding:40px 20px;color:#718096;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a202c;color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:600;z-index:300;transition:transform .25s;max-width:90%}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px;color:#718096;font-size:13px}
.fab{position:fixed;bottom:24px;right:calc(50% - 340px + 16px);padding:14px 22px;border-radius:30px;background:#2F5597;color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(47,85,151,.4);z-index:60}

.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200}
.mov.show{display:flex}
.msh{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;padding:20px 16px 40px;max-height:85vh;overflow-y:auto}
.mttl{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:none;border:none;font-size:24px;color:#718096;cursor:pointer;line-height:1}
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:600;color:#4a5568;margin-bottom:5px;display:block}
.fi{width:100%;padding:12px;border:1.5px solid #cbd5e0;border-radius:8px;font-size:15px;color:#1a202c;-webkit-appearance:none;display:block}
.fi:focus{outline:none;border-color:#2F5597}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.msub{width:100%;padding:14px;background:#2F5597;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.msub:disabled{background:#cbd5e0}
</style>
</head>

</div>

      var qs = Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
      }).join("&");
      url += "?" + qs;
    }

    if (body) {
      opts.method = "POST";
      opts.headers = { "Content-Type": "text/plain;charset=utf-8" };
      opts.body = JSON.stringify(body);
    }
    return fetch(url, opts)

      .then(function(j) { if (j.status === "error") throw new Error(j.message); return j; });
  }

    html += "<button class='at" + (dashArea === "all" ? " active" : "") + "' data-a='all'>전체</button>";
    areaList.forEach(function(a) {
      html += "<button class='at" + (dashArea === a ? " active" : "") + "' data-a='" + a + "'>" + a + "</button>";
    });
    html += "</div>";

    if (!filtered.length) {
      html += "<div class='empty'>검색 결과가 없습니다</div>";
    } else {
      Object.keys(byArea).sort().forEach(function(area) {
        html += "<div class='asec'><div class='ahdr'><span>" + area + "</span><span>" + byArea[area].length + "개</span></div>";
        byArea[area].forEach(function(item) {
          var s = getStatus(item);
          var idx = items.indexOf(item);
          var sid = "s" + idx;
          html += "<div class='ic " + s + "'>";
          html += "<div class='itop'><div class='iname'>" + escHtml(item.name) + "</div>";
          html += "<span class='bdg " + s + "'>" + (s === "d" ? "재고부족" : "정상") + "</span></div>";
          html += "<div class='imeta'>" + escHtml(item.spec || "") + (item.minStock ? " · 적정 " + item.minStock + "개" : "") + " · " + escHtml(item.loc || "") + "</div>";
          html += "<div class='ibot'><span class='slbl'>현재재고</span>";
          html += "<input class='sinp' id='" + sid + "' type='number' value='" + item.curStock + "' min='0' step='0.5' data-idx='" + idx + "'>";
          html += "<button class='sbtn' data-save='" + idx + "' data-sid='" + sid + "'>저장</button>";
          html += "<button class='dbtn' data-del='" + idx + "'>삭제</button>";
          html += "</div></div>";
        });
        html += "</div>";
      });
    }

    document.getElementById("dc").innerHTML = html;

    // 이벤트 재연결
    var sbEl = document.getElementById("sb");
    if (sbEl) {
      sbEl.addEventListener("input", function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(doSearch, 400);
      });
      sbEl.addEventListener("compositionend", doSearch);
    }

    document.querySelectorAll(".fb").forEach(function(btn) {
      btn.addEventListener("click", function() { setFilter(this.getAttribute("data-f")); });
    });

    document.querySelectorAll(".at").forEach(function(btn) {
      btn.addEventListener("click", function() { setArea(this.getAttribute("data-a")); });
    });

    document.querySelectorAll("[data-save]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-save"));
        var sid = this.getAttribute("data-sid");
        saveStock(idx, sid);
      });
    });

    document.querySelectorAll("[data-del]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-del"));
        deleteItem(idx);
      });
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function saveStock(idx, sid) {
    var val = parseFloat(document.getElementById(sid).value) || 0;
    showToast("저장 중...");
    var p = isLive ? api(null, { action: "updateMasterStock", itemName: items[idx].name, stock: val }) : Promise.resolve();
    p.then(function() {
      items[idx].curStock = val;
      showToast("재고 저장 완료");
      renderDashboard();
      renderRequest();
    }).catch(function() { showToast("저장 실패"); });
  }

  function deleteItem(idx) {
    if (!confirm(items[idx].name + "\n\n이 품목을 삭제할까요?")) return;
    var name = items[idx].name;
    showToast("삭제 중...");
    var p = isLive ? api(null, { action: "deleteItem", itemName: name }) : Promise.resolve();
    p.then(function() {
      items.splice(idx, 1);
      showToast("삭제 완료");
      renderDashboard();
      renderRequest();
    }).catch(function() { showToast("삭제 실패"); });
  }

  function openModal() {
    ["nname","nloc","nspec","nmin","ncur"].forEach(function(id) { document.getElementById(id).value = ""; });
    document.getElementById("mov").classList.add("show");
  }
  function closeModal() { document.getElementById("mov").classList.remove("show"); }

  function addItem() {
    var name = document.getElementById("nname").value.trim();
    if (!name) { showToast("품목명을 입력해주세요"); return; }
    if (items.find(function(i) { return i.name === name; })) { showToast("이미 같은 이름의 품목이 있습니다"); return; }
    var item = {
      name: name,
      loc: document.getElementById("nloc").value.trim(),
      spec: document.getElementById("nspec").value.trim(),
      minStock: parseFloat(document.getElementById("nmin").value) || 0,
      curStock: parseFloat(document.getElementById("ncur").value) || 0
    };
    var btn = document.getElementById("msub");
    btn.disabled = true;
    showToast("추가 중...");
    var p = isLive ? api(null, { action: "addItem", item: item }) : Promise.resolve();
    p.then(function() {
      items.push(item);
      closeModal();
      showToast(name + " 추가 완료");
      renderDashboard();
      renderRequest();
    }).catch(function() { showToast("추가 실패"); }).finally(function() { btn.disabled = false; });
  }

  function renderRequest() {
    var shortage = items.filter(function(i) { return getStatus(i) === "d" && i.minStock > 0; });
    if (!shortage.length) {
      document.getElementById("rc").innerHTML = "<div class='empty'>모든 재고가 정상입니다!</div>";
      return;
    }
    var html = "<div class='rcard'><div class='rhdr'><span>물품 청구서 - 부족 " + shortage.length + "개 품목</span><span>" + new Date().toLocaleDateString("ko-KR") + "</span></div>";
    shortage.forEach(function(item, idx) {
      var need = Math.max(0, item.minStock - item.curStock);
      html += "<div class='rrow'>";
      html += "<div class='rname'><p>" + escHtml(item.name) + "</p><span>" + escHtml(item.loc) + " · " + escHtml(item.spec) + "</span></div>";
      html += "<div class='qc'>";
      html += "<button class='qbtn' data-qid='q" + idx + "' data-qd='-1'>-</button>";
      html += "<input class='qinp' id='q" + idx + "' type='number' value='" + need + "' min='0' step='0.5'>";
      html += "<button class='qbtn' data-qid='q" + idx + "' data-qd='1'>+</button>";
      html += "</div>";
      html += "<button class='ckbtn on' id='c" + idx + "' data-ck='" + idx + "'>✓</button>";
      html += "</div>";
    });
    html += "</div><button class='subbtn' id='subbtn' data-total='" + shortage.length + "'>청구서 제출</button>";
    document.getElementById("rc").innerHTML = html;

    document.querySelectorAll("[data-qid]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var qid = this.getAttribute("data-qid");
        var d = parseFloat(this.getAttribute("data-qd"));
        var el = document.getElementById(qid);
        el.value = Math.max(0, (parseFloat(el.value) || 0) + d);
      });
    });

    document.querySelectorAll("[data-ck]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var on = this.classList.contains("on");
        this.classList.toggle("on", !on);
        this.classList.toggle("off", on);
        this.textContent = on ? "○" : "✓";
      });
    });

    var subBtn = document.getElementById("subbtn");
    if (subBtn) {
      subBtn.addEventListener("click", function() {
        var total = parseInt(this.getAttribute("data-total"));
        submitReq(total);
      });
    }
  }

  function submitReq(total) {
    var shortage = items.filter(function(i) { return getStatus(i) === "d" && i.minStock > 0; });
    var reqs = [];
    for (var i = 0; i < total; i++) {
      var chk = document.getElementById("c" + i);
      if (chk && chk.classList.contains("on")) {
        var qty = parseFloat(document.getElementById("q" + i).value || 0);
        if (qty > 0 && shortage[i]) {
          reqs.push({ name: shortage[i].name, loc: shortage[i].loc, spec: shortage[i].spec, curStock: shortage[i].curStock, minStock: shortage[i].minStock, qty: qty });
        }
      }
    }
    if (!reqs.length) { showToast("청구할 항목을 선택해주세요"); return; }
    var btn = document.getElementById("subbtn");
    btn.disabled = true;
    showToast("청구서 제출 중...");
    var p = isLive ? api(null, { action: "submitRequest", items: reqs }) : Promise.resolve();
    p.then(function() {
      reqHist.unshift({ date: new Date().toLocaleString("ko-KR"), items: reqs });
      if (reqHist.length > 30) reqHist.pop();
      localStorage.setItem("orh6", JSON.stringify(reqHist));
      renderHistory();
      showToast(reqs.length + "개 품목 청구 완료");
    }).catch(function() { showToast("제출 실패"); }).finally(function() { btn.disabled = false; });
  }

  function renderWeekly() {
    var html = "<button class='gbtn' id='gbtn'>오늘 날짜로 전체 품목 불러오기</button>";
    if (!weeklyData.length) {
      html += "<div class='empty'>주간 실사 데이터가 없습니다</div>";
      document.getElementById("wc").innerHTML = html;
      document.getElementById("gbtn").addEventListener("click", generateWeekly);
      return;
    }
    var dg = {};
    weeklyData.forEach(function(w) { if (!dg[w.date]) dg[w.date] = []; dg[w.date].push(w); });
    var ld = Object.keys(dg).sort().reverse()[0];
    var rows = dg[ld] || [];
    var filled = rows.filter(function(r) { return r.stock !== "" && r.stock !== undefined && r.stock !== null; });
    html += "<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'><span style='font-size:13px;font-weight:600'>" + ld + "</span><span class='bdg o'>" + filled.length + "/" + rows.length + " 입력완료</span></div>";
    rows.forEach(function(r, idx) {
      var done = r.stock !== "" && r.stock !== undefined && r.stock !== null;
      html += "<div class='wrow " + (done ? "done" : "pending") + "'>";
      html += "<div class='winfo'><p>" + escHtml(r.name) + "</p><span>" + escHtml(r.spec) + " · " + escHtml(r.loc) + "</span></div>";
      html += "<input class='sinp' id='w" + idx + "' type='number' placeholder='수량' value='" + (done ? r.stock : "") + "' min='0' step='0.5'>";
      html += "<button class='sbtn' data-widx='" + idx + "' data-wsid='w" + idx + "'>저장</button>";
      html += "</div>";
    });
    document.getElementById("wc").innerHTML = html;
    document.getElementById("gbtn").addEventListener("click", generateWeekly);
    document.querySelectorAll("[data-widx]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-widx"));
        var sid = this.getAttribute("data-wsid");
        saveWeeklyStock(idx, sid);
      });
    });
  }

  function generateWeekly() {
    showToast("품목 불러오는 중...");
    api(null, { action: "generateWeeklyList" }).then(function(res) {
      showToast(res.result.count + "개 품목 입력 완료");
      loadData();
    }).catch(function(e) { showToast("실패: " + e.message); });
  }

  function saveWeeklyStock(idx, sid) {
    var val = parseFloat(document.getElementById(sid).value);
    if (isNaN(val)) { showToast("수량을 입력해주세요"); return; }
    var r = weeklyData[idx];
    showToast("저장 중...");
    var p = isLive ? api(null, { action: "updateWeeklyStock", itemName: r.name, date: r.date, stock: val }) : Promise.resolve();
    p.then(function() {
      weeklyData[idx].stock = val;
      var m = items.find(function(i) { return i.name === r.name; });
      if (m) m.curStock = val;
      showToast("저장 완료");
      renderWeekly(); renderDashboard(); renderRequest();
    }).catch(function() { showToast("저장 실패"); });
  }

  function renderHistory() {
    if (!reqHist.length) {
      document.getElementById("hc").innerHTML = "<div class='empty'>청구 이력이 없습니다</div>";
      return;
    }
    var html = reqHist.map(function(h) {
      return "<div class='hcard'><div class='hdate'>" + h.date + "</div>" +
        h.items.map(function(it) {
          return "<div class='hrow'><span style='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px'>" + escHtml(it.name) + "</span><span class='hqty'>+" + it.qty + "개</span></div>";
        }).join("") + "</div>";
    }).join("");
    document.getElementById("hc").innerHTML = html;
  }

  function showTab(tab) {
    document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
    document.querySelectorAll(".nb").forEach(function(b) { b.classList.remove("active"); });
    document.getElementById("page-" + tab).classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
    document.getElementById("fab").style.display = (tab === "dashboard") ? "flex" : "none";
    if (tab === "history") renderHistory();
  }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function() { t.classList.remove("show"); }, 3000);
  }

  // 이벤트 등록
  document.getElementById("rbtn").addEventListener("click", loadData);
  document.getElementById("fab").addEventListener("click", openModal);
  document.getElementById("mclose").addEventListener("click", closeModal);
  document.getElementById("msub").addEventListener("click", addItem);
  document.getElementById("mov").addEventListener("click", function(e) { if (e.target === this) closeModal(); });

  document.getElementById("tab-dashboard").addEventListener("click", function() { showTab("dashboard"); });
  document.getElementById("tab-request").addEventListener("click", function() { showTab("request"); });
  document.getElementById("tab-weekly").addEventListener("click", function() { showTab("weekly"); });
  document.getElementById("tab-history").addEventListener("click", function() { showTab("history"); });

  loadData();
})();

</script>
</body>
</html>
