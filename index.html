<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수술실 소모품 재고관리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a202c}
.app{max-width:680px;margin:0 auto;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:11px;color:#718096;margin-top:1px}
.nav{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:57px;z-index:40}
.nav-btn{flex:1;padding:10px 4px;font-size:11px;font-weight:600;color:#718096;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn i{font-size:18px}
.nav-btn.active{color:#185FA5;border-bottom-color:#185FA5}
.page{display:none;padding:12px}
.page.active{display:block}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.s-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px;text-align:center}
.s-num{font-size:28px;font-weight:700;line-height:1}
.s-label{font-size:11px;color:#718096;margin-top:4px}
.s-num.danger{color:#A32D2D}
.s-num.ok{color:#3B6D11}
.s-num.total{color:#185FA5}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:11px 40px 11px 38px;border:1.5px solid #e2e8f0;border-radius:10px;background:#fff;font-size:15px;color:#1a202c;-webkit-appearance:none}
.search-input:focus{outline:none;border-color:#185FA5}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#718096;font-size:18px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#718096;cursor:pointer;background:none;border:none;padding:4px;display:none;font-size:16px}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;color:#718096;cursor:pointer}
.filter-btn.active{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.area-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.area-tabs::-webkit-scrollbar{display:none}
.area-tab{padding:6px 14px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;color:#718096;cursor:pointer;white-space:nowrap;flex-shrink:0}
.area-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.item-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.item-card.danger{border-left:3px solid #E24B4A}
.item-card.ok{border-left:3px solid #639922}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:#718096;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.danger{background:#FCEBEB;color:#A32D2D}
.badge.ok{background:#EAF3DE;color:#3B6D11}
.stock-edit-box{display:flex;align-items:center;gap:4px;flex-shrink:0}
.stock-inp{width:48px;height:34px;text-align:center;font-size:15px;font-weight:600;border:1px solid #cbd5e0;border-radius:6px;background:#fff;color:#1a202c}
.save-btn{width:34px;height:34px;border-radius:6px;border:none;background:#185FA5;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn{width:34px;height:34px;border-radius:6px;border:none;background:#FCEBEB;color:#A32D2D;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.area-section{margin-bottom:16px}
.area-header{font-size:13px;font-weight:700;color:#185FA5;padding:8px 12px;background:#E6F1FB;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between}
.req-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:12px}
.req-header{background:#E6F1FB;padding:10px 14px;font-size:13px;font-weight:600;color:#185FA5;display:flex;justify-content:space-between;align-items:center}
.req-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #e2e8f0}
.req-name{flex:1;min-width:0}
.req-name p{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-name span{font-size:11px;color:#718096}
.qty-ctrl{display:flex;align-items:center;gap:4px}
.qty-btn{width:30px;height:30px;border-radius:6px;border:1px solid #cbd5e0;background:#f7fafc;color:#185FA5;font-size:18px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-inp{width:42px;height:30px;text-align:center;font-size:14px;font-weight:600;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:#1a202c}
.chk-btn{width:30px;height:30px;border-radius:6px;border:none;font-size:14px;cursor:pointer}
.chk-btn.on{background:#185FA5;color:#fff}
.chk-btn.off{background:#f7fafc;color:#718096}
.submit-btn{width:100%;padding:14px;background:#185FA5;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.submit-btn:disabled{background:#cbd5e0;color:#718096;cursor:default}
.gen-btn{width:100%;padding:13px;background:#fff;border:1px solid #cbd5e0;color:#185FA5;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.weekly-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #e2e8f0}
.weekly-row.done{border-left:3px solid #639922}
.weekly-row.pending{border-left:3px solid #BA7517}
.weekly-info{flex:1;min-width:0}
.weekly-info p{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weekly-info span{font-size:11px;color:#718096}
.history-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px 14px;margin-bottom:8px}
.history-date{font-size:11px;color:#718096;margin-bottom:8px}
.history-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #e2e8f0}
.history-row:last-child{border-bottom:none}
.history-qty{font-weight:700;color:#185FA5}
.empty{text-align:center;padding:40px 20px;color:#718096;font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a202c;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;transition:transform .25s;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px;color:#718096;font-size:13px}
.conn-status{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.conn-status.live{background:#EAF3DE;color:#3B6D11}
.conn-status.error{background:#FCEBEB;color:#A32D2D}
.refresh-btn{margin-left:auto;background:none;border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:12px;color:#718096;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0}
.add-fab{position:fixed;bottom:24px;right:calc(50% - 340px + 16px);width:54px;height:54px;border-radius:50%;background:#185FA5;color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(24,95,165,.4);z-index:60}
@media(max-width:712px){.add-fab{right:16px}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200}
.modal-overlay.show{display:flex}
.modal-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;padding:20px 16px 40px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:22px;color:#718096;cursor:pointer}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:#4a5568;margin-bottom:5px;display:block}
.form-input{width:100%;padding:11px 12px;border:1.5px solid #cbd5e0;border-radius:8px;font-size:15px;color:#1a202c;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:#185FA5}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-submit{width:100%;padding:14px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.modal-submit:disabled{background:#cbd5e0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <i class="ti ti-building-hospital" style="font-size:22px;color:#185FA5"></i>
    <div>
      <div class="header-title">수술실 소모품 관리</div>
      <div class="header-sub" id="connStatus"><span class="conn-status live"><i class="ti ti-circle-filled" style="font-size:8px"></i>연결 확인 중...</span></div>
    </div>
    <button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh" style="font-size:14px"></i>새로고침</button>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)"><i class="ti ti-chart-bar"></i>현황</button>
    <button class="nav-btn" onclick="showTab('request',this)"><i class="ti ti-clipboard-list"></i>청구</button>
    <button class="nav-btn" onclick="showTab('weekly',this)"><i class="ti ti-calendar-check"></i>주간실사</button>
    <button class="nav-btn" onclick="showTab('history',this)"><i class="ti ti-clock"></i>이력</button>
  </nav>
  <div class="page active" id="page-dashboard">
    <div id="dash-content"><div class="loading">데이터 불러오는 중...</div></div>
  </div>
  <div class="page" id="page-request">
    <div id="req-content"><div class="loading">데이터 불러오는 중...</div></div>
  </div>
  <div class="page" id="page-weekly">
    <div id="weekly-content"><div class="loading">데이터 불러오는 중...</div></div>
  </div>
  <div class="page" id="page-history">
    <div id="history-content"><div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px"></i>청구 이력이 없습니다</div></div>
  </div>
</div>

<button class="add-fab" id="addFab" onclick="openAddModal()"><i class="ti ti-plus"></i></button>

<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-sheet">
    <div class="modal-title">
      <span><i class="ti ti-package" style="margin-right:6px"></i>새 품목 추가</span>
      <button class="modal-close" onclick="closeAddModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">품목명 *</label>
      <input class="form-input" id="newName" placeholder="예: Surgical Glove 7.0">
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">보관위치</label>
        <input class="form-input" id="newLoc" placeholder="예: A구역">
      </div>
      <div class="form-group">
        <label class="form-label">규격/단위</label>
        <input class="form-input" id="newSpec" placeholder="예: ⓑ">
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">적정재고</label>
        <input class="form-input" id="newMin" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">현재재고</label>
        <input class="form-input" id="newCur" type="number" min="0" placeholder="0">
      </div>
    </div>
    <button class="modal-submit" id="addSubmitBtn" onclick="submitAddItem()"><i class="ti ti-plus" style="margin-right:4px"></i>품목 추가하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP5GPGaZ5-etMBwpWxUmY7kJA8VhWI0D8QV4ZqKWuGDvT2JoNq3HduwgykmPPknHmxzg/exec";
const FALLBACK_ITEMS = JSON.parse(document.getElementById("app-data").textContent);

let items = [];
let weeklyData = [];
let reqHistory = JSON.parse(localStorage.getItem("or_history_v5") || "[]");
let dashFilter = "all";
let dashSearch = "";
let dashArea = "all";
let searchTimer = null;
let isLive = false;

async function callScript(params, body) {
  let url = SCRIPT_URL;
  if (params) url += "?" + new URLSearchParams(params).toString();
  const opts = {method: "GET"};
  if (body) {
    opts.method = "POST";
    opts.headers = {"Content-Type": "text/plain;charset=utf-8"};
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(url, opts);
  const json = await res.json();
  if (json.status === "error") throw new Error(json.message);
  return json;
}

async function loadData() {
  showToast("데이터 불러오는 중...");
  try {
    const res = await callScript({action: "getAll"});
    items = res.data.master || [];
    weeklyData = res.data.weekly || [];
    isLive = true;
    document.getElementById("connStatus").innerHTML = "<span class=\"conn-status live\"><i class=\"ti ti-circle-filled\" style=\"font-size:8px\"></i>실시간 연결됨 · " + items.length + "개 품목</span>";
    renderAll();
    showToast("✓ " + items.length + "개 품목 로드 완료");
  } catch(e) {
    items = FALLBACK_ITEMS.map(function(i) { return Object.assign({}, i); });
    isLive = false;
    document.getElementById("connStatus").innerHTML = "<span class=\"conn-status error\"><i class=\"ti ti-alert-circle\" style=\"font-size:11px\"></i>오프라인 · " + items.length + "개 품목</span>";
    renderAll();
    showToast("오프라인 모드");
  }
}

function getStatus(item) {
  if (!item.minStock) return "ok";
  return item.curStock < item.minStock ? "danger" : "ok";
}

function getAreas() {
  return Array.from(new Set(items.filter(function(i){return i.loc;}).map(function(i){return i.loc;}))).sort();
}

function renderAll() {
  renderDashboard();
  renderRequest();
  renderWeekly();
}

function onSearchInput(val) {
  var cl = document.getElementById("searchClear");
  if (cl) cl.style.display = val ? "block" : "none";
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { dashSearch = val; renderDashboard(); }, 300);
}

function onSearchCompose(val) {
  clearTimeout(searchTimer);
  dashSearch = val;
  renderDashboard();
}

function clearSearch() {
  var sb = document.getElementById("searchBox");
  var cl = document.getElementById("searchClear");
  if (sb) sb.value = "";
  if (cl) cl.style.display = "none";
  dashSearch = "";
  renderDashboard();
}

function setAreaTab(area, el) {
  dashArea = area;
  document.querySelectorAll(".area-tab").forEach(function(b) { b.classList.remove("active"); });
  el.classList.add("active");
  renderDashboard();
}

function renderDashboard() {
  var valid = items.filter(function(i) { return i.name; });
  var shortage = valid.filter(function(i) { return getStatus(i) === "danger"; });
  var stable = valid.filter(function(i) { return getStatus(i) === "ok"; });
  var areas = getAreas();

  var filtered = valid.slice();
  if (dashFilter === "danger") filtered = shortage.slice();
  if (dashFilter === "ok") filtered = stable.slice();
  if (dashArea !== "all") filtered = filtered.filter(function(i) { return i.loc === dashArea; });
  if (dashSearch.trim()) {
    var q = dashSearch.trim().toLowerCase();
    filtered = filtered.filter(function(i) {
      return i.name.toLowerCase().indexOf(q) >= 0 ||
             (i.loc || "").toLowerCase().indexOf(q) >= 0 ||
             (i.spec || "").toLowerCase().indexOf(q) >= 0;
    });
  }

  var byArea = {};
  filtered.forEach(function(i) {
    var a = i.loc || "기타";
    if (!byArea[a]) byArea[a] = [];
    byArea[a].push(i);
  });

  var curSearch = document.getElementById("searchBox") ? document.getElementById("searchBox").value : dashSearch;

  var areaBtns = areas.map(function(a) {
    return "<button class=\"area-tab " + (dashArea === a ? "active" : "") + "\" onclick=\"setAreaTab('" + a + "',this)\">" + a + "</button>";
  }).join("");

  var html = "<div class=\"summary-grid\">" +
    "<div class=\"s-card\"><div class=\"s-num danger\">" + shortage.length + "</div><div class=\"s-label\">재고부족</div></div>" +
    "<div class=\"s-card\"><div class=\"s-num ok\">" + stable.length + "</div><div class=\"s-label\">정상</div></div>" +
    "<div class=\"s-card\"><div class=\"s-num total\">" + valid.length + "</div><div class=\"s-label\">전체 품목</div></div>" +
    "</div>" +
    "<div class=\"search-wrap\">" +
    "<i class=\"ti ti-search search-icon\"></i>" +
    "<input class=\"search-input\" id=\"searchBox\" type=\"search\" placeholder=\"품목명 검색...\" value=\"" + curSearch.replace(/"/g, "&quot;") + "\" oninput=\"onSearchInput(this.value)\" oncompositionend=\"onSearchCompose(this.value)\" autocomplete=\"off\" autocorrect=\"off\" autocapitalize=\"off\" spellcheck=\"false\">" +
    "<button class=\"search-clear\" id=\"searchClear\" onclick=\"clearSearch()\" style=\"display:" + (curSearch ? "block" : "none") + "\"><i class=\"ti ti-x\"></i></button>" +
    "</div>" +
    "<div class=\"filter-row\">" +
    "<button class=\"filter-btn " + (dashFilter === "all" ? "active" : "") + "\" onclick=\"dashFilter=&apos;all&apos;;renderDashboard()\">전체</button>" +
    "<button class=\"filter-btn " + (dashFilter === "danger" ? "active" : "") + "\" onclick=\"dashFilter=&apos;danger&apos;;renderDashboard()\">부족만</button>" +
    "<button class=\"filter-btn " + (dashFilter === "ok" ? "active" : "") + "\" onclick=\"dashFilter=&apos;ok&apos;;renderDashboard()\">정상만</button>" +
    "</div>" +
    "<div class=\"area-tabs\">" +
    "<button class=\"area-tab " + (dashArea === "all" ? "active" : "") + "\" onclick=\"setAreaTab(&apos;all&apos;,this)\">전체</button>" +
    areaBtns +
    "</div>";

  if (!filtered.length) {
    html += "<div class=\"empty\"><i class=\"ti ti-search\" style=\"font-size:32px;display:block;margin-bottom:8px\"></i>검색 결과가 없습니다</div>";
  } else {
    Object.keys(byArea).sort().forEach(function(area) {
      html += "<div class=\"area-section\"><div class=\"area-header\"><span><i class=\"ti ti-map-pin\" style=\"font-size:13px;margin-right:4px\"></i>" + area + "</span><span style=\"font-size:11px\">" + byArea[area].length + "개</span></div>";
      byArea[area].forEach(function(item, idx) {
        var s = getStatus(item);
        var safeId = btoa(encodeURIComponent(item.name)).replace(/[^a-zA-Z0-9]/g, "");
        var dataIdx = items.indexOf(item);
        html += "<div class=\"item-card " + s + "\">" +
          "<div class=\"item-info\">" +
          "<div class=\"item-name\">" + item.name + "</div>" +
          "<div class=\"item-meta\">" + (item.spec || "") + (item.minStock ? " · 적정 " + item.minStock + "개" : "") + "</div>" +
          "<div style=\"margin-top:4px\"><span class=\"badge " + s + "\">" + (s === "danger" ? "재고부족" : "정상") + "</span></div>" +
          "</div>" +
          "<div class=\"stock-edit-box\">" +
          "<input class=\"stock-inp\" id=\"stock_" + safeId + "\" type=\"number\" value=\"" + item.curStock + "\" min=\"0\" step=\"0.5\">" +
          "<button class=\"save-btn\" onclick=\"saveStock(" + dataIdx + ",&apos;stock_" + safeId + "&apos;)\"><i class=\"ti ti-device-floppy\" style=\"font-size:16px\"></i></button>" +
          "<button class=\"del-btn\" onclick=\"confirmDelete(" + dataIdx + ")\"><i class=\"ti ti-trash\" style=\"font-size:16px\"></i></button>" +
          "</div></div>";
      });
      html += "</div>";
    });
  }
  document.getElementById("dash-content").innerHTML = html;
}

async function saveStock(idx, inputId) {
  var val = parseFloat(document.getElementById(inputId).value) || 0;
  showToast("저장 중...");
  try {
    if (isLive) await callScript(null, {action: "updateMasterStock", itemName: items[idx].name, stock: val});
    items[idx].curStock = val;
    showToast("✓ 재고 저장 완료");
    renderDashboard();
    renderRequest();
  } catch(e) { showToast("저장 실패: " + e.message); }
}

function confirmDelete(idx) {
  if (!confirm(items[idx].name + "\n\n이 품목을 삭제할까요?")) return;
  deleteItem(idx);
}

async function deleteItem(idx) {
  var name = items[idx].name;
  showToast("삭제 중...");
  try {
    if (isLive) await callScript(null, {action: "deleteItem", itemName: name});
    items.splice(idx, 1);
    showToast("✓ 삭제 완료");
    renderDashboard();
    renderRequest();
  } catch(e) { showToast("삭제 실패: " + e.message); }
}

function openAddModal() {
  ["newName","newLoc","newSpec","newMin","newCur"].forEach(function(id) { document.getElementById(id).value = ""; });
  document.getElementById("addModal").classList.add("show");
}
function closeAddModal() { document.getElementById("addModal").classList.remove("show"); }

async function submitAddItem() {
  var name = document.getElementById("newName").value.trim();
  if (!name) { showToast("품목명을 입력해주세요"); return; }
  if (items.find(function(i) { return i.name === name; })) { showToast("이미 같은 이름의 품목이 있습니다"); return; }
  var item = {
    name: name,
    loc: document.getElementById("newLoc").value.trim(),
    spec: document.getElementById("newSpec").value.trim(),
    minStock: parseFloat(document.getElementById("newMin").value) || 0,
    curStock: parseFloat(document.getElementById("newCur").value) || 0
  };
  var btn = document.getElementById("addSubmitBtn");
  btn.disabled = true;
  showToast("추가 중...");
  try {
    if (isLive) await callScript(null, {action: "addItem", item: item});
    items.push(item);
    closeAddModal();
    showToast("✓ " + name + " 추가 완료");
    renderDashboard();
    renderRequest();
  } catch(e) { showToast("추가 실패: " + e.message); }
  finally { btn.disabled = false; }
}

function renderRequest() {
  var shortage = items.filter(function(i) { return getStatus(i) === "danger" && i.minStock > 0; });
  if (!shortage.length) {
    document.getElementById("req-content").innerHTML = "<div class=\"empty\"><i class=\"ti ti-circle-check\" style=\"font-size:32px;display:block;margin-bottom:8px;color:#639922\"></i>모든 재고가 정상입니다!</div>";
    return;
  }
  var html = "<div class=\"req-card\"><div class=\"req-header\"><span><i class=\"ti ti-clipboard-list\" style=\"font-size:14px;margin-right:4px\"></i>물품 청구서 — 부족 " + shortage.length + "개 품목</span><span style=\"font-size:11px\">" + new Date().toLocaleDateString("ko-KR") + "</span></div>";
  shortage.forEach(function(item, idx) {
    var need = Math.max(0, item.minStock - item.curStock);
    html += "<div class=\"req-row\">" +
      "<div class=\"req-name\"><p>" + item.name + "</p><span>" + item.loc + " · " + item.spec + "</span></div>" +
      "<div class=\"qty-ctrl\">" +
      "<button class=\"qty-btn\" onclick=\"adjQty(&apos;q" + idx + "&apos;,-1)\">−</button>" +
      "<input class=\"qty-inp\" id=\"q" + idx + "\" type=\"number\" value=\"" + need + "\" min=\"0\" step=\"0.5\">" +
      "<button class=\"qty-btn\" onclick=\"adjQty(&apos;q" + idx + "&apos;,1)\">+</button>" +
      "</div>" +
      "<button class=\"chk-btn on\" id=\"c" + idx + "\" onclick=\"toggleChk(" + idx + ")\"><i class=\"ti ti-check\"></i></button>" +
      "</div>";
  });
  html += "</div><button class=\"submit-btn\" id=\"submitBtn\" onclick=\"submitReq(" + shortage.length + ")\"><i class=\"ti ti-send\" style=\"font-size:16px\"></i>청구서 제출</button>";
  document.getElementById("req-content").innerHTML = html;
}

function adjQty(id, d) {
  var el = document.getElementById(id);
  el.value = Math.max(0, (parseFloat(el.value) || 0) + d);
}

function toggleChk(idx) {
  var btn = document.getElementById("c" + idx);
  var on = btn.classList.contains("on");
  btn.classList.toggle("on", !on);
  btn.classList.toggle("off", on);
  btn.innerHTML = on ? "<i class=\"ti ti-circle\"></i>" : "<i class=\"ti ti-check\"></i>";
}

async function submitReq(total) {
  var shortage = items.filter(function(i) { return getStatus(i) === "danger" && i.minStock > 0; });
  var reqs = [];
  for (var i = 0; i < total; i++) {
    var chk = document.getElementById("c" + i);
    if (chk && chk.classList.contains("on")) {
      var qty = parseFloat(document.getElementById("q" + i).value || 0);
      if (qty > 0 && shortage[i]) reqs.push({name: shortage[i].name, loc: shortage[i].loc, spec: shortage[i].spec, curStock: shortage[i].curStock, minStock: shortage[i].minStock, qty: qty});
    }
  }
  if (!reqs.length) { showToast("청구할 항목을 선택해주세요"); return; }
  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  showToast("청구서 제출 중...");
  try {
    if (isLive) await callScript(null, {action: "submitRequest", items: reqs});
    reqHistory.unshift({date: new Date().toLocaleString("ko-KR"), items: reqs});
    if (reqHistory.length > 30) reqHistory.pop();
    localStorage.setItem("or_history_v5", JSON.stringify(reqHistory));
    renderHistory();
    showToast("✓ " + reqs.length + "개 품목 청구 완료");
  } catch(e) { showToast("제출 실패: " + e.message); }
  finally { btn.disabled = false; }
}

function renderWeekly() {
  var html = "<button class=\"gen-btn\" onclick=\"generateWeekly()\"><i class=\"ti ti-refresh\" style=\"font-size:16px\"></i>오늘 날짜로 전체 품목 불러오기</button>";
  if (!weeklyData.length) {
    html += "<div class=\"empty\">주간 실사 데이터가 없습니다<br>위 버튼을 눌러 시작하세요</div>";
    document.getElementById("weekly-content").innerHTML = html;
    return;
  }
  var dateGroup = {};
  weeklyData.forEach(function(w) {
    if (!dateGroup[w.date]) dateGroup[w.date] = [];
    dateGroup[w.date].push(w);
  });
  var latestDate = Object.keys(dateGroup).sort().reverse()[0];
  var rows = dateGroup[latestDate] || [];
  var filled = rows.filter(function(r) { return r.stock !== "" && r.stock !== undefined && r.stock !== null; });
  html += "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">" +
    "<span style=\"font-size:13px;font-weight:600\">" + latestDate + "</span>" +
    "<span class=\"badge ok\">" + filled.length + "/" + rows.length + " 입력완료</span></div>";
  rows.forEach(function(r, idx) {
    var done = r.stock !== "" && r.stock !== undefined && r.stock !== null;
    var safeId = "w" + idx;
    html += "<div class=\"weekly-row " + (done ? "done" : "pending") + "\">" +
      "<div class=\"weekly-info\"><p>" + r.name + "</p><span>" + r.spec + " · " + r.loc + "</span></div>" +
      "<input class=\"stock-inp\" id=\"" + safeId + "\" type=\"number\" placeholder=\"수량\" value=\"" + (done ? r.stock : "") + "\" min=\"0\" step=\"0.5\">" +
      "<button class=\"save-btn\" onclick=\"saveWeeklyStock(" + idx + ",&apos;" + safeId + "&apos;)\"><i class=\"ti ti-device-floppy\" style=\"font-size:16px\"></i></button>" +
      "</div>";
  });
  document.getElementById("weekly-content").innerHTML = html;
}

async function generateWeekly() {
  showToast("품목 불러오는 중...");
  try {
    var res = await callScript(null, {action: "generateWeeklyList"});
    showToast("✓ " + res.result.count + "개 품목 입력 완료");
    await loadData();
    showTab("weekly", document.querySelectorAll(".nav-btn")[2]);
  } catch(e) { showToast("실패: " + e.message); }
}

async function saveWeeklyStock(idx, inputId) {
  var val = parseFloat(document.getElementById(inputId).value);
  if (isNaN(val)) { showToast("수량을 입력해주세요"); return; }
  var r = weeklyData[idx];
  showToast("저장 중...");
  try {
    if (isLive) await callScript(null, {action: "updateWeeklyStock", itemName: r.name, date: r.date, stock: val});
    weeklyData[idx].stock = val;
    var m = items.find(function(i) { return i.name === r.name; });
    if (m) { m.curStock = val; }
    showToast("✓ 저장 완료");
    renderWeekly(); renderDashboard(); renderRequest();
  } catch(e) { showToast("저장 실패: " + e.message); }
}

function renderHistory() {
  if (!reqHistory.length) {
    document.getElementById("history-content").innerHTML = "<div class=\"empty\"><i class=\"ti ti-inbox\" style=\"font-size:32px;display:block;margin-bottom:8px\"></i>청구 이력이 없습니다</div>";
    return;
  }
  document.getElementById("history-content").innerHTML = reqHistory.map(function(h) {
    return "<div class=\"history-card\"><div class=\"history-date\"><i class=\"ti ti-clock\" style=\"font-size:12px;margin-right:4px\"></i>" + h.date + "</div>" +
      h.items.map(function(it) {
        return "<div class=\"history-row\"><span style=\"color:#718096;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px\">" + it.name + "</span><span class=\"history-qty\">+" + it.qty + "개</span></div>";
      }).join("") + "</div>";
  }).join("");
}

function showTab(tab, el) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("page-" + tab).classList.add("active");
  el.classList.add("active");
  document.getElementById("addFab").style.display = (tab === "dashboard") ? "flex" : "none";
  if (tab === "history") renderHistory();
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 3000);
}

loadData();
</script>
</body>
</html>
